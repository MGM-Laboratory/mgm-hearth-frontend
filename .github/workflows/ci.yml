name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make workspace contract available
        run: |
          mkdir -p ../_workspace
          if [ -f ../API_CONTRACT.yaml ]; then
            ln -s "$(pwd)/../API_CONTRACT.yaml" .
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Generate API types (if contract present)
        run: |
          if [ -f ../API_CONTRACT.yaml ]; then
            npm run generate:api
          else
            echo "no API_CONTRACT.yaml found — skipping"
          fi

      - name: API drift check
        run: |
          if [ -f ../API_CONTRACT.yaml ]; then
            git diff --exit-code -- lib/api/schema.d.ts || (echo "schema.d.ts is out of date; run npm run generate:api" && exit 1)
          fi

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Playwright (smoke)
        env:
          PLAYWRIGHT_SKIP_WEB_SERVER: ""
        run: npm run e2e

      - name: Next build
        run: npm run build

      - name: Docker build
        run: docker build -t mgm/hearth-frontend:ci .
