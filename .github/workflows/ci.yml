name: ci

on:
  push:
    branches: [main, staging]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      # NOTE: typecheck/lint are temporarily skipped in CI (next.config.ts
      # sets ignoreBuildErrors/ignoreDuringBuilds) until the scaffold's
      # type drift cleanup PR. Local `npm run typecheck` still runs them.

      - name: Next build
        run: npm run build
